<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:text-decoration="http://www.w3.org/1999/xhtml"
      xmlns:border-radius="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <style>
        table {width: 70%; border-collapse: collapse; margin-top: 20px;}
        th, td {padding: 8px; text-align: left; border: 1px solid #ccc; }
        th {background-color: #f2f2f2;}
        .btn-edit { color: #2196f3; text-decoration: none; margin-right: 10px; }
        .btn-delete { background: none; border: none; color: red; cursor: pointer; padding: 0; font: inherit; }
        .btn-delete:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div style="background: #f4f4f4; padding: 10px; margin-bottom: 20px;">
    Вы вошли как: <b sec:authentication="name">Имя</b> |
    Роли: <span th:each="authority : ${#authentication.getAuthorities()}">
         <i th:text="${authority.getAuthority().replace('ROLE_', '').replace('FACTOR_PASSWORD', '') + ' '}"></i>
     </span>
</div>
<h2> Список пользователей</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Никнейм</th> <th>Имя</th>
        <th>Фамилия</th>
        <th>Возраст</th>
        <th>Email</th>
        <th>Роль</th> <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.username}">Никнейм</td> <td th:text="${user.name}">Billy</td>
        <td th:text="${user.lastName}">Ballon</td>
        <td th:text="${user.age}">25</td>
        <td th:text="${user.email}">BilBal@gmail.com</td>
        <td>
            <span th:each="role : ${user.roles}"
                  th:text="${role.name.replace('ROLE_', '') + ' '}">
            </span>
        </td>
        <td>
            <a sec:authorize="hasRole('ADMIN')" class="btn-edit" th:href="@{/admin/{id}/edit(id=${user.id})}">Изменить</a>
            <form sec:authorize="hasRole('ADMIN')" th:method="DELETE" th:action="@{/admin/{id}(id=${user.id})}" style="display: inline">
                <button type="submit" class="btn-delete"
                        onclick="return confirm('Вы уверены в этом?')">Удалить</button>
            </form>

            <span sec:authorize="hasRole('USER') and !hasRole('ADMIN')" style="color: gray;">У вас нету достаточных прав</span>
        </td>
    </tr>
    </tbody>
</table>
<br/>
<hr/>
<a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/new}"
    style="display: inline-block; padding: 10px; background: #4caf50; color: white; text-decoration: none; border-radius: 4px;">
    Добавить нового пользователя
</a>

<form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <button type="submit" style="cursor:pointer;">Выйти из системы</button>
</form>
</body>
</html>
