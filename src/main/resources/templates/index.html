<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <style>
        table {width: 50%; border-collapse: collapse; margin-top: 20px;}
        th, td {padding: 8px; text-align: left; border: 1px solid #ccc; }
        th {background-color: #f2f2f2;}
        .btn-edit { color: #2196f3; text-decoration: none; margin-right: 10px; }
        .btn-delete { background: none; border: none; color: red; cursor: pointer; padding: 0; font: inherit; }
        .btn-delete:hover { text-decoration: underline; }
    </style>
</head>
<body>
<h2> Список пользователей</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Возраст</th>
        <th>Email</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Billy</td>
        <td th:text="${user.lastName}">Ballon</td>
        <td th:text="${user.age}">25</td>
        <td th:text="${user.email}">BilBal@gmail.com</td>
        <td>
            <a class="btn-edit" th:href="@{/users/{id}/edit(id=${user.id})}">Изменить</a>
            <form th:method="DELETE" th:action="@{/users/{id}(id=${user.id})}" style="display: inline">
                <button type="submit" class="btn-delete"
                        onclick="return confirm('Вы уверены в этом?')">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<br/>
<hr/>
<a th:href="@{/users/new}">Добавить нового пользователя</a>
</body>
</html>
