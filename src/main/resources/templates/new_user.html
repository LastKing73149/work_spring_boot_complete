<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>New User</title>
    <style>
        .error {color: red; font-size: 0.8em; margin-bottom: 10px;}
        label{display: block; margin-top: 10px; font-weight: bold;}
        input {padding: 5px; width: 250px;}
        .btn {margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 4px; }
        .btn:hover {background: #1976d2;}
    </style>
</head>
<body>
<div style="background: #f4f4f4; padding: 10px; margin-bottom: 20px;">
    Вы вошли как: <b sec:authentication="name">Имя</b> |
    Роли: <span th:each="authority : ${#authentication.getAuthorities()}">
         <i th:text="${authority.getAuthority().replace('ROLE_', '') + ' '}"></i>
     </span>
</div>
<h2>Добавить нового пользователя</h2>

<form th:method="POST" th:action="@{/admin}" th:object="${user}">
    <label for="username">Никнейм:</label>
    <input type="text" th:field="*{username}" id="username" required/>
    <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Ошибка никнейма</div>
    <br/><br/>

    <label for="password">Пароль:</label>
    <input type="password" th:field="*{password}" id="password" required/>
    <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Ошибка пароля</div>
    <br/><br/>

    <label for="roles">Роль:</label>
    <select th:field="*{roles}" id="roles" style="padding: 5px; width: 262px">
        <option th:value="1">Пользователь(User)</option>
        <option th:value="2">Администратор(Admin)</option>
    </select>
    <div class="error" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}">Ошибка роли</div>
    <br/><br/>

    <label for="name">Имя:</label>
    <input type="text" th:field="*{name}" id="name" required/>
    <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка имени</div>
    <br/><br/>

    <label for="lastName">Фамилия:</label>
    <input type="text" th:field="*{lastName}" id="lastName" required/>
    <div class="error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Ошибка фамилии</div>
    <br/><br/>

    <label for="age">Возраст:</label>
    <input type="number" th:field="*{age}" id="age"
           min="1" max="100" step="1" required/>
    <div class="error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">Ошибка возраста</div>
    <br/><br/>

    <label for="email">Email:</label>
    <input type="email" th:field="*{email}" id="email" required/>
    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Ошибка email</div>
    <br/><br/>

    <button type="submit" class="btn">Создать нового пользователя</button>
</form>
<br/>
<a th:href="@{/admin}">Назад к списку</a>
</body>
</html>
