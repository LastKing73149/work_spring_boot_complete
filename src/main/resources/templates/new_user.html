<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New User</title>
    <style>
        .error {color: red; font-size: 0.8em; margin-bottom: 10px;}
        label{display: block; margin-top: 10px; font-weight: bold;}
        input {padding: 5px; width: 250px;}
        .btn {margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 4px; }
        .btn:hover {background: #1976d2;}
    </style>
</head>
<body>
<h2>Добавить нового пользователя</h2>

<form th:method="POST" th:action="@{/users}" th:object="${user}">
    <label for="name">Имя:</label>
    <input type="text" th:field="*{name}" id="name" required/>
    <div style="color: red; font-size: 0.8em;" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка имени</div>
    <br/><br/>

    <label for="lastName">Фамилия:</label>
    <input type="text" th:field="*{lastName}" id="lastName" required/>
    <div style="color: red; font-size: 0.8em;" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Ошибка фамилии</div>
    <br/><br/>

    <label for="age">Возраст:</label>
    <input type="number" th:field="*{age}" id="age"
           min="1" max="100" step="1" required/>
    <div style="color: red; font-size: 0.8em;" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">Ошибка возраста</div>
    <br/><br/>

    <label for="email">Email:</label>
    <input type="email" th:field="*{email}" id="email" required/>
    <div style="color: red; font-size: 0.8em;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Ошибка email</div>
    <br/><br/>

    <button type="submit">Создать нового пользователя</button>
</form>
<br/>
<a th:href="@{/users}">Назад к списку</a>
</body>
</html>
